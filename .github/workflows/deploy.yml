name: Déploiement

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build API
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Build front
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Préparer la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Ajouter le VPS aux hôtes connus
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # rsync par dossier (pas de source multiple + --delete : ça supprimerait
      # aussi .env et node_modules, qui ne viennent pas du dépôt).
      - name: Déployer le code compilé de l'API
        run: |
          rsync -az --delete server/dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/server/dist/"
          rsync -az --delete server/prisma/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/server/prisma/"
          rsync -az server/package.json server/package-lock.json \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/server/"

      - name: Déployer le front
        run: |
          rsync -az --delete client/dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/client/"

      - name: Installer les dépendances et migrer la base
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -e
            cd '${{ secrets.VPS_APP_DIR }}/server'
            npm ci --omit=dev
            npm run db:deploy
          "

      - name: Redémarrer l'API
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo systemctl restart sortiespourpetits-api'
